name: Docker build-> push-> deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Actions tab → Run workflow (manual deploy)

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/hello:latest .

    - name: Push Image to Docker Hub
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/hello:latest

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker stop spring-demo || true
          docker rm -f spring-demo || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hello:latest
          docker run -d --name spring-demo -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/hello:latest
